name: lint

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - ytmusicapi/**
      - tests/**

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          version: 0.15.12
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          version: 0.15.12
          args: format --check
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install mypy==1.20.2
      - run:  mypy --install-types --non-interactive
